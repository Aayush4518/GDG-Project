<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Guardian - Registration Test</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #4A90E2, #7BB3F0);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .form-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        .title {
            font-size: 28px;
            font-weight: bold;
            color: #2c3e50;
            margin: 0;
        }
        .input-container {
            margin-bottom: 20px;
        }
        .input-wrapper {
            display: flex;
            align-items: center;
            background: #fff;
            border: 1px solid #e1e8ed;
            border-radius: 12px;
            padding: 14px 16px;
        }
        .input-icon {
            margin-right: 12px;
            color: #7f8c8d;
        }
        .input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 16px;
            color: #2c3e50;
        }
        .input::placeholder {
            color: #999;
        }
        .dropdown-icon {
            margin-left: 8px;
            color: #7f8c8d;
        }
        .register-button {
            background: #4A90E2;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 16px;
            font-size: 18px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 4px 16px rgba(74, 144, 226, 0.3);
        }
        .register-button:hover {
            background: #357ABD;
        }
    </style>
</head>
<body>
    <div class="form-card">
        <div class="header">
            <h1 class="title">Tourist</h1>
            <h1 class="title">Registration</h1>
        </div>
        
        <div class="input-container">
            <div class="input-wrapper">
                <span class="input-icon">👤</span>
                <input type="text" class="input" placeholder="Full Name">
            </div>
        </div>
        
        <div class="input-container">
            <div class="input-wrapper">
                <span class="input-icon">📞</span>
                <input type="tel" class="input" placeholder="Contact number with STD code">
                <span class="dropdown-icon">▼</span>
            </div>
        </div>
        
        <div class="input-container">
            <div class="input-wrapper">
                <span class="input-icon">👤</span>
                <input type="text" class="input" placeholder="Emergency Contact Name">
            </div>
        </div>
        
        <div class="input-container">
            <div class="input-wrapper">
                <span class="input-icon">📱</span>
                <input type="tel" class="input" placeholder="Emergency Contact Phone">
            </div>
        </div>
        
        <div class="input-container">
            <div class="input-wrapper">
                <span class="input-icon">📅</span>
                <input type="date" class="input" placeholder="Trip Start Date">
            </div>
        </div>
        
        <div class="input-container">
            <div class="input-wrapper">
                <span class="input-icon">📅</span>
                <input type="date" class="input" placeholder="Trip End Date">
            </div>
        </div>
        
        <button class="register-button" onclick="alert('Registration successful!')">Register</button>
    </div>
</body>
</html>
